# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

imports:
    - { resource: 'services/*.{yaml,yml}' }

services:

    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\State\UserPasswordHasher:
        arguments:
            $persistProcessor: '@api_platform.doctrine.orm.state.persist_processor'

    App\State\PrestationStateProcessor:
        arguments:
            $persistProcessor: '@api_platform.doctrine.orm.state.persist_processor'

    App\Serializer\AdminGroupsContextBuilder:
        decorates: 'api_platform.serializer.context_builder'
        arguments:
            $decorated: '@.inner'

    # Monolog handlers Discord (level 400 = ERROR, level 500 = CRITICAL)
    app.monolog.discord_errors:
        class: App\Monolog\DiscordHandler
        autowire: false
        arguments:
            - '@http_client'
            - '%env(default::DISCORD_WEBHOOK_ERRORS)%'
            - 400

    app.monolog.discord_critical:
        class: App\Monolog\DiscordHandler
        autowire: false
        arguments:
            - '@http_client'
            - '%env(default::DISCORD_WEBHOOK_CRITICAL)%'
            - 500

    App\Command\DiscordDeployNotifyCommand:
        arguments:
            $webhookUrl: '%env(default::DISCORD_WEBHOOK_DEPLOY)%'

    App\Controller\DeployController:
        arguments:
            $discordDeployWebhook: '%env(default::DISCORD_WEBHOOK_DEPLOY)%'